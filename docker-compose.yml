# Full monitoring stack — Prometheus, Grafana, node_exporter, cAdvisor,
# postgres_exporter. All ports/credentials come from .env (see .env.example).
# Run via setup.sh, or manually: docker compose up -d

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "${PROM_PORT:-9000}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    networks: [monitoring]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-8443}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks: [monitoring]

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    pid: host
    network_mode: host              # binds :9100 on the host
    volumes:
      - /:/host:ro,rslave
    command:
      - "--path.rootfs=/host"
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    networks: [monitoring]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    ports:
      - "${PGEXPORTER_PORT:-9187}:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://${PG_MONITOR_USER}:${PG_MONITOR_PASSWORD}@${PG_CONTAINER_NAME}:5432/${PG_DATABASE}?sslmode=${PG_SSLMODE:-require}
    restart: unless-stopped
    networks:
      - monitoring
      - app-net                      # must reach the postgres container by name

networks:
  monitoring:
    name: monitoring
  app-net:
    external: true
    name: ${APP_NETWORK}             # your existing app docker network

volumes:
  prom-data:
  grafana-data:
